services:
  - type: web
    name: staffgraft-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # paste in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://staffgraft.onrender.com   # update after frontend deploy

  - type: static
    name: staffgraft-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://staffgraft-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
